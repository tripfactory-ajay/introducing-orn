<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORN - Infrastructure for Tourism</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --logo-dark-blue: #1e3a5f;
            --logo-blue: #2e7d9c;
            --logo-cyan: #00bcd4;
            --logo-green: #7cb342;
            --logo-yellow: #fdd835;
            --logo-red: #e53935;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #000000;
            color: #ffffff;
            overflow: hidden;
        }
        
        @media print {
            @page {
                size: A4 landscape;
                margin: 0;
            }
            
            body {
                overflow: visible;
                background: #000000;
            }
            
            .slide {
                display: block !important;
                page-break-after: always;
                page-break-inside: avoid;
                width: 297mm;
                height: 210mm;
                position: relative;
                overflow: hidden;
                background: #000000 !important;
            }
            
            .nav-arrow, .progress, .download-btn {
                display: none !important;
            }
            
            .slide:last-child {
                page-break-after: auto;
            }
        }
        
        .slide {
            width: 100vw;
            height: 100vh;
            display: none;
            position: relative;
            background: #000000;
            overflow: hidden;
        }
        
        .slide.active {
            display: flex;
            flex-direction: column;
        }
        
        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 40px;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
        }
        
        .orn-logo {
            height: 35px;
            width: auto;
        }
        
        .slide-number {
            font-size: 13px;
            color: rgba(255,255,255,0.5);
            font-weight: 400;
            letter-spacing: 2px;
        }
        
        /* Navigation */
        .nav-arrow {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: all 0.3s ease;
        }
        
        .nav-arrow:hover {
            background: rgba(255,255,255,0.1);
        }
        
        .nav-arrow.prev { left: 25px; }
        .nav-arrow.next { right: 25px; }
        
        .nav-arrow svg {
            width: 20px;
            height: 20px;
            stroke: rgba(255,255,255,0.6);
            fill: none;
            stroke-width: 2;
        }
        
        .progress {
            position: fixed;
            bottom: 0;
            left: 0;
            height: 2px;
            background: rgba(255,255,255,0.3);
            transition: width 0.3s ease;
            z-index: 1001;
        }
        
        .download-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 45px;
            height: 45px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: all 0.3s ease;
        }
        
        .download-btn:hover {
            background: rgba(255,255,255,0.1);
        }
        
        .download-btn svg {
            width: 18px;
            height: 18px;
            stroke: rgba(255,255,255,0.6);
            fill: none;
            stroke-width: 2;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .animate {
            animation: fadeIn 0.6s ease forwards;
        }
        
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }
        
        /* SLIDE 7: Pyramid - EXACT PDF Layout */
        .slide7-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 100px 60px 60px;
        }
        
        .slide7-title {
            font-size: 36px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 50px;
            color: #ffffff;
        }
        
        .pyramid-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 60px;
            flex: 1;
        }
        
        .pyramid-visual {
            position: relative;
            width: 400px;
            height: 450px;
        }
        
        .pyramid-level {
            position: absolute;
            left: 0;
            display: flex;
            align-items: center;
        }
        
        .pyramid-shape {
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        .level-1 {
            top: 0;
            width: 100%;
        }
        
        .level-1 .pyramid-shape {
            width: 200px;
            margin: 0 auto;
            background: linear-gradient(135deg, #a8e6cf 0%, #7fcdbb 100%);
            clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
        }
        
        .level-2 {
            top: 85px;
            width: 100%;
        }
        
        .level-2 .pyramid-shape {
            width: 300px;
            margin: 0 auto;
            background: linear-gradient(135deg, #4dd0e1 0%, #26c6da 100%);
            clip-path: polygon(16.5% 0%, 83.5% 0%, 100% 100%, 0% 100%);
        }
        
        .level-3 {
            top: 170px;
            width: 100%;
        }
        
        .level-3 .pyramid-shape {
            width: 400px;
            margin: 0 auto;
            background: linear-gradient(135deg, #29b6f6 0%, #03a9f4 100%);
            clip-path: polygon(12.5% 0%, 87.5% 0%, 100% 100%, 0% 100%);
        }
        
        .level-4 {
            top: 255px;
            width: 100%;
        }
        
        .level-4 .pyramid-shape {
            width: 400px;
            margin: 0 auto;
            background: linear-gradient(135deg, #1e88e5 0%, #1976d2 100%);
            clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%);
            height: 90px;
        }
        
        .level-5 {
            top: 340px;
            width: 100%;
        }
        
        .level-5 .pyramid-shape {
            width: 400px;
            margin: 0 auto;
            background: linear-gradient(135deg, #1565c0 0%, #0d47a1 100%);
            clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%);
            height: 110px;
        }
        
        .pyramid-icons {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 30px;
            align-items: center;
        }
        
        .pyramid-icon {
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.2);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }
        
        .pyramid-numbers {
            display: flex;
            flex-direction: column;
            gap: 75px;
            margin-top: 30px;
        }
        
        .number-circle {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
            color: #ffffff;
            background: rgba(255,255,255,0.15);
            border: 2px solid rgba(255,255,255,0.3);
        }
        
        .pyramid-texts {
            display: flex;
            flex-direction: column;
            gap: 75px;
            margin-top: 30px;
            max-width: 500px;
        }
        
        .pyramid-text-item {
            font-size: 18px;
            font-weight: 500;
            color: #ffffff;
            line-height: 1.4;
            padding: 10px 0;
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <button class="nav-arrow prev" onclick="prevSlide()">
        <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <button class="nav-arrow next" onclick="nextSlide()">
        <svg viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
    </button>

    <!-- Download Button -->
    <button class="download-btn" onclick="printToPDF()" title="Save as PDF">
        <svg viewBox="0 0 24 24">
            <path d="M6 9V2h12v7M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/>
            <path d="M6 14h12v8H6z"/>
        </svg>
    </button>

    <!-- SLIDE 7: Pyramid - EXACT PDF Layout -->
    <div class="slide active" id="slide7">
        <div class="header">
            <img src="orn-logo.png" alt="ORN" class="orn-logo">
            <span class="slide-number">07 / 09</span>
        </div>
        <div class="slide7-content">
            <div class="slide7-title animate delay-1">ORN Global Construct</div>
            <div class="pyramid-wrapper animate delay-2">
                <!-- Left side: Pyramid shapes with numbers -->
                <div class="pyramid-visual">
                    <div class="pyramid-level level-1">
                        <div class="pyramid-shape"></div>
                    </div>
                    <div class="pyramid-level level-2">
                        <div class="pyramid-shape"></div>
                    </div>
                    <div class="pyramid-level level-3">
                        <div class="pyramid-shape"></div>
                    </div>
                    <div class="pyramid-level level-4">
                        <div class="pyramid-shape"></div>
                    </div>
                    <div class="pyramid-level level-5">
                        <div class="pyramid-shape">
                            <div class="pyramid-icons">
                                <div class="pyramid-icon">👥</div>
                                <div class="pyramid-icon">🚌</div>
                                <div class="pyramid-icon">🚗</div>
                                <div class="pyramid-icon">🏢</div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Numbers column -->
                <div class="pyramid-numbers">
                    <div class="number-circle">1</div>
                    <div class="number-circle">2</div>
                    <div class="number-circle">3</div>
                    <div class="number-circle">4</div>
                    <div class="number-circle">5</div>
                </div>
                
                <!-- Text column -->
                <div class="pyramid-texts">
                    <div class="pyramid-text-item">Respectable Trusted Brand</div>
                    <div class="pyramid-text-item">Global Distribution - Americas - Europe, Middle East, Asia, Australia & NZ</div>
                    <div class="pyramid-text-item">Differentiated Technology and Product Offerings</div>
                    <div class="pyramid-text-item">Solid Financial Position and Backing</div>
                    <div class="pyramid-text-item">People, Assets and Infrastructure</div>
                </div>
            </div>
        </div>
    </div>

    <div class="progress" id="progress"></div>

    <script>
        let currentSlide = 7;
        const totalSlides = 9;
        
        function showSlide(n) {
            const slides = document.querySelectorAll('.slide');
            if (n > totalSlides) currentSlide = 1;
            if (n < 1) currentSlide = totalSlides;
            
            slides.forEach(slide => slide.classList.remove('active'));
            document.getElementById(`slide${currentSlide}`).classList.add('active');
            
            const progress = (currentSlide / totalSlides) * 100;
            document.getElementById('progress').style.width = progress + '%';
        }
        
        function nextSlide() {
            currentSlide++;
            showSlide(currentSlide);
        }
        
        function prevSlide() {
            currentSlide--;
            showSlide(currentSlide);
        }
        
        function printToPDF() {
            const slides = document.querySelectorAll('.slide');
            slides.forEach(slide => slide.classList.add('active'));
            
            document.querySelectorAll('.nav-arrow').forEach(el => el.style.display = 'none');
            document.querySelector('.progress').style.display = 'none';
            document.querySelector('.download-btn').style.display = 'none';
            
            window.print();
            
            setTimeout(() => {
                slides.forEach((slide, index) => {
                    if (index !== currentSlide - 1) slide.classList.remove('active');
                });
                document.querySelectorAll('.nav-arrow').forEach(el => el.style.display = 'flex');
                document.querySelector('.progress').style.display = 'block';
                document.querySelector('.download-btn').style.display = 'flex';
            }, 1000);
        }
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') nextSlide();
            if (e.key === 'ArrowLeft') prevSlide();
        });
        
        showSlide(currentSlide);
    </script>
</body>
</html>
